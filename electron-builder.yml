appId: com.zhaoyisen.smartweeklyreport
productName: Smart Weekly Report
electronDist: node_modules/electron/dist
compression: store
directories:
  output: release
files:
  - out/**
  - package.json
  - node_modules/sql.js/**
win:
  icon: build/icon.ico
  artifactName: Smart-Weekly-Report-Windows-${version}-${arch}.${ext}
  target:
    - nsis
    - portable
    - zip
nsis:
  artifactName: Smart-Weekly-Report-Setup-${version}-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
portable:
  artifactName: Smart-Weekly-Report-Portable-${version}-${arch}.${ext}
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  artifactName: Smart-Weekly-Report-macOS-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
linux:
  icon: build/icon.png
  category: Office
  artifactName: Smart-Weekly-Report-Linux-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
