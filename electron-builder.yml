appId: com.weeklyreport.tool
productName: Smart Weekly Report
electronDist: node_modules/electron/dist
compression: store
icon: build/icon.ico
directories:
  output: release
files:
  - out/**
  - package.json
  - node_modules/sql.js/**
win:
  target:
    - nsis
    - portable
nsis:
  artifactName: Smart-Weekly-Report-Setup-${version}-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
portable:
  artifactName: Smart-Weekly-Report-Portable-${version}-${arch}.${ext}
