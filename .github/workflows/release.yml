name: Multi-platform release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub Release tag to upload assets to
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run dist:win
          - platform: macos
            os: macos-latest
            command: npm run dist:mac
          - platform: linux
            os: ubuntu-latest
            command: npm run dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 build/icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 build/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 build/icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_512x512.png
          cp build/icon.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build release assets
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: ${{ matrix.command }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-weekly-report-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
          if-no-files-found: error

  publish:
    name: Upload assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.zip' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.tar.gz' \
          \) -print0)
          gh release upload "${{ steps.release.outputs.tag }}" "${files[@]}" --repo zhaoyisen/weekly-report --clobber
